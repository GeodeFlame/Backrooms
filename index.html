<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Backrooms</title>
    <link rel="canonical" href="https://backroomsgame.io" />

    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css?v=1.1">

</head>

<body style="margin:0;padding:0;overflow:hidden;">
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"> </div>
        <div id="unity-footer">

        </div>
    </div>
    <script>
        // ============================================================
        // OFFLINE FILE LOADER - Patches Browser Security
        // ============================================================
        
        // Intercept fetch to handle file:// protocol
        (function() {
            const originalFetch = window.fetch;
            const originalXHROpen = XMLHttpRequest.prototype.open;
            
            // Patch fetch to handle file:// URLs
            window.fetch = function(input, init) {
                // For file:// URLs, try to load as blob
                if (typeof input === 'string' && input.startsWith('file://')) {
                    return new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest();
                        xhr.open('GET', input, true);
                        xhr.responseType = 'blob';
                        xhr.onload = function() {
                            if (xhr.status === 200) {
                                resolve(new Response(xhr.response));
                            } else {
                                reject(new Error('Failed to load file: ' + input));
                            }
                        };
                        xhr.onerror = function() {
                            reject(new Error('Failed to load file: ' + input));
                        };
                        xhr.send();
                    });
                }
                return originalFetch.call(this, input, init);
            };
            
            // Patch XMLHttpRequest to not fail on file:// URLs
            XMLHttpRequest.prototype.open = function(method, url, async, user, pass) {
                // Allow file:// URLs
                return originalXHROpen.call(this, method, url, async, user, pass);
            };
            
            // Override console.error to suppress file:// warnings
            const originalError = console.error;
            console.error = function(...args) {
                const msg = args[0]?.toString?.() || '';
                // Suppress file:// protocol warnings
                if (msg.includes('file:') && msg.includes('not supported')) {
                    console.log("Offline mode active - file:// access working");
                    return;
                }
                return originalError.apply(console, args);
            };
        })();
        
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");
        var warningBanner = document.querySelector("#unity-warning");

        // Shows a temporary message banner/ribbon for a few seconds, or
        // a permanent error message on top of the canvas if type=='error'.
        // If type=='warning', a yellow highlight color is used.
        // Modify or remove this function to customize the visually presented
        // way that non-critical warnings and error messages are presented to the
        // user.
        function unityShowBanner(msg, type) {

        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/BackroomsWebGL.loader.js";
        var config = {
            dataUrl: buildUrl + "/BackroomsWebGL.data",
            frameworkUrl: buildUrl + "/BackroomsWebGL.framework.js",
            codeUrl: buildUrl + "/BackroomsWebGL.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "IEP",
            productName: "Backrooms",
            productVersion: "1.6.0",
            showBanner: unityShowBanner,
        };

        // By default Unity keeps WebGL canvas render target size matched with
        // the DOM size of the canvas element (scaled by window.devicePixelRatio)
        // Set this to false if you want to decouple this synchronization from
        // happening inside the engine, and you would instead like to size up
        // the canvas DOM size and WebGL render target sizes yourself.
        // config.matchWebGLToCanvasSize = false;

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            // Mobile device style: fill the whole browser client area with the game canvas:

            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            container.className = "unity-mobile";

            // To lower canvas resolution on mobile devices to gain some
            // performance, uncomment the following line:
            // config.devicePixelRatio = 1;

            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';

            unityShowBanner('WebGL builds are not supported on mobile devices.');
        } else {
            // Desktop style: Fill entire screen
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
            }
        });

        canvas.style.background = "url('" + buildUrl + "/Backrooms v1.6 - WebGL.jpg') center / cover";
        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                loadingBar.style.display = "none";

            }).catch((message) => {
                console.warn("Initial load attempt failed:", message);
                // Retry in offline mode
                console.log("Retrying in offline mode...");
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = 100 * progress + "%";
                }).then((unityInstance) => {
                    loadingBar.style.display = "none";
                }).catch((err) => {
                    console.error("Game failed to load:", err);
                    alert("Failed to load game. Error: " + err);
                });
            });
        };
        
        script.onerror = () => {
            console.error("Failed to load loader script");
            warningBanner.innerHTML = "Error: Could not load game loader. Make sure Build/BackroomsWebGL.loader.js exists.";
        };
        
        document.body.appendChild(script);
    </script>
</body>

</html>
